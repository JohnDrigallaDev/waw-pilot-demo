server:
  port: ${PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_MB:20}MB
      max-request-size: ${MAX_UPLOAD_MB:20}MB

zugferd:
  api-key: ${ZUGFERD_SERVICE_API_KEY:}
  max-upload-mb: ${MAX_UPLOAD_MB:20}
  ghostscript-command: ${GHOSTSCRIPT_COMMAND:gs}
  verapdf-command: ${VERAPDF_COMMAND:verapdf}
  icc-profile-path: ${ICC_PROFILE_PATH:/usr/share/color/icc/ghostscript/srgb.icc}
